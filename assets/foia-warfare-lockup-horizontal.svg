<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 64">
  <!-- FOIA Warfare horizontal lockup: Variant F stencil mark + wordmark -->
  <!-- Nav and email signature use: mark left, wordmark right, 64px tall -->
  <rect width="480" height="64" fill="#111111"/>

  <!-- === VARIANT F STENCIL MARK (64x64) === -->
  <rect x="0" y="0" width="3" height="64" fill="#00C2FF"/>
  <rect x="9" y="8" width="6" height="48" fill="#00C2FF"/>
  <rect x="9" y="8" width="19" height="6" fill="#00C2FF"/>
  <rect x="9" y="28" width="13" height="6" fill="#00C2FF"/>
  <path d="M 30,8 L 34,56 L 43.5,18 L 53,56 L 57,8"
        stroke="#00C2FF" stroke-width="9" stroke-linejoin="miter"
        stroke-linecap="square" fill="none"/>
  <rect x="9" y="22" width="51" height="5" fill="#111111"/>

  <!-- Separator -->
  <rect x="72" y="12" width="1" height="40" fill="#2a2a2a"/>

  <!-- FOIA white -->
  <text x="84" y="36"
        font-family="'Franklin Gothic Medium', 'Franklin Gothic Book', 'ITC Franklin Gothic Std', 'Gill Sans MT Condensed', 'Arial Narrow', sans-serif"
        font-weight="900"
        font-size="24"
        fill="#ffffff"
        letter-spacing="0.05em">FOIA</text>
  <!-- WARFARE cyan -->
  <text x="84" y="56"
        font-family="'Franklin Gothic Medium', 'Franklin Gothic Book', 'ITC Franklin Gothic Std', 'Gill Sans MT Condensed', 'Arial Narrow', sans-serif"
        font-weight="900"
        font-size="14"
        fill="#00C2FF"
        letter-spacing="0.22em">WARFARE</text>
</svg>
